x-api-build: &api-build
  context: .
  dockerfile: apps/api/Dockerfile

x-api-environment: &api-environment
  NODE_ENV: production
  PORT: 3001
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-jwt-secret-change-me}
  DATABASE_URL: ${DATABASE_URL:-postgresql://whiteboard:whiteboard@postgres:5432/tactical_whiteboard_db?schema=public}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-whiteboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whiteboard}
      POSTGRES_DB: ${POSTGRES_DB:-tactical_whiteboard_db}
    ports:
      - "${POSTGRES_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whiteboard-network

  migrate:
    image: rctw-api:local
    command: ["pnpm", "--filter", "@rctw/database", "db:migrate:deploy"]
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - whiteboard-network
    restart: "no"

  api:
    image: rctw-api:local
    build: *api-build
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - whiteboard-network

  web:
    image: rctw-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - whiteboard-network

volumes:
  postgres-data:

networks:
  whiteboard-network:
    driver: bridge
